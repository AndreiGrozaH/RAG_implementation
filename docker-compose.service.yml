services:
  rag-api:
    image: lex-advisor-rag:${IMAGE_TAG:-latest}
    #build: .    
    environment:
      # Variabile Core
      - QDRANT_URL=http://qdrant:6333
      - RAG_API_URL=${RAG_API_URL}
      - API_AUTH_KEY=${API_AUTH_KEY}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      
      # Google Cloud 
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_LOCATION=${GCP_LOCATION:-europe-west3}
      #- GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/google-creds.json

      # Observabilitate OpenTelemetry 
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-lex-advisor-rag}
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES}    
    
    networks:
      - lex-advisor
    depends_on:
      - qdrant
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.8.4
    ports:
      - "6333:6333"    
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - lex-advisor
    restart: unless-stopped

networks:
  lex-advisor:
    external: true

volumes:
  qdrant_data: